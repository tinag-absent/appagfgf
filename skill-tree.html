<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>機関員スキルツリー — 海蝕機関</title>
  <link rel="icon" type="image/png" href="./images/favicon.png">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/mobile.css">
  <style>
    .st-header {
      border-left: 4px solid var(--primary);
      padding-left: 1rem;
      margin-bottom: 1.5rem;
    }
    /* track selector */
    .track-selector {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .track-btn {
      padding: .4rem 1rem;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted-foreground);
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .track-btn:hover, .track-btn.active {
      border-color: var(--tc, var(--primary));
      color: var(--tc, var(--primary));
      background: color-mix(in srgb, var(--tc, var(--primary)) 10%, transparent);
    }

    /* Progress bar */
    .st-progress-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .st-progress-card {
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.07);
      padding: .9rem 1rem;
    }
    .stp-track {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .stp-bar {
      height: 4px;
      background: rgba(255,255,255,.08);
      margin-bottom: .3rem;
    }
    .stp-fill {
      height: 100%;
      transition: width .8s ease;
    }
    .stp-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      color: var(--muted-foreground);
    }

    /* Tree canvas */
    .st-tree-wrap {
      position: relative;
      overflow-x: auto;
    }
    .st-tree {
      min-width: 700px;
      padding: 1.5rem 0;
    }
    .st-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 0;
      position: relative;
    }

    /* Connector SVG */
    .st-connectors {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* Skill node */
    .sk-node {
      width: 120px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      padding-top: 32px; /* space for connector lines */
    }
    .sk-node:first-child { padding-top: 0; }
    .sk-bubble {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      background: var(--background);
    }
    .sk-bubble.unlocked {
      border-color: var(--sk-color);
      box-shadow: 0 0 16px color-mix(in srgb, var(--sk-color) 40%, transparent);
    }
    .sk-bubble.locked {
      border-color: rgba(255,255,255,.12);
      filter: grayscale(1);
      opacity: .5;
      cursor: not-allowed;
    }
    .sk-bubble.unlocked:hover {
      transform: scale(1.1);
      box-shadow: 0 0 24px color-mix(in srgb, var(--sk-color) 60%, transparent);
    }
    .sk-level-badge {
      position: absolute;
      bottom: -4px; right: -4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--sk-color);
      border: 2px solid var(--background);
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      color: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .sk-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: var(--foreground);
      text-align: center;
      margin-top: .5rem;
      text-transform: uppercase;
      line-height: 1.3;
    }
    .sk-node.locked .sk-name { color: var(--muted-foreground); }

    /* connector lines via absolute pos */
    .sk-connector-down {
      position: absolute;
      top: 64px;
      left: 50%;
      width: 1px;
      height: 32px;
      background: linear-gradient(180deg, var(--sk-color), rgba(255,255,255,.1));
      transform: translateX(-50%);
      z-index: 1;
    }
    .sk-connector-down.locked { background: rgba(255,255,255,.08); }

    /* Detail popup */
    .sk-detail {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid rgba(255,255,255,.15);
      padding: 1.75rem 2rem;
      max-width: 440px;
      width: 90%;
      z-index: 300;
    }
    .sk-detail.open { display: block; animation: sk-pop .25s ease; }
    @keyframes sk-pop { from{opacity:0;transform:translate(-50%,-48%)} to{opacity:1;transform:translate(-50%,-50%)} }
    .sk-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 299;
      backdrop-filter: blur(2px);
    }
    .sk-overlay.open { display: block; }
    .sdd-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sdd-icon { font-size: 2.5rem; }
    .sdd-close {
      margin-left: auto;
      background: none;
      border: 1px solid rgba(255,255,255,.15);
      color: var(--muted-foreground);
      cursor: pointer;
      padding: .3rem .7rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
    }
    .sdd-close:hover { color: var(--destructive); border-color: var(--destructive); }
    .sdd-effects {
      margin-top: 1rem;
    }
    .sdd-effect {
      display: flex;
      gap: .6rem;
      align-items: flex-start;
      padding: .4rem 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: .82rem;
      color: var(--muted-foreground);
    }
    .sdd-bullet {
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .sdd-req {
      margin-top: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: rgba(255,255,255,.3);
    }
    .sdd-unlock-btn {
      margin-top: 1rem;
      width: 100%;
      padding: .75rem;
      background: rgba(0,255,255,.1);
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      cursor: pointer;
      transition: all .2s;
    }
    .sdd-unlock-btn:hover { background: rgba(0,255,255,.18); }
    .sdd-unlock-btn:disabled { opacity: .35; cursor: not-allowed; }
    .sdd-locked-notice {
      margin-top: .75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: rgba(239,68,68,.7);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <button class="mobile-menu-toggle">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <div class="mobile-menu-overlay"></div>

    <main class="main-content scanline">
      <div class="container animate-fadeIn">

        <div class="st-header">
          <h1 style="font-size:2.5rem;font-family:'Space Grotesk',sans-serif;font-weight:700;color:white;text-transform:uppercase;">
            機関員スキルツリー
          </h1>
          <p class="font-mono" style="font-size:.875rem;margin-top:.5rem;color:var(--muted-foreground);">
            AGENT SKILL TREE — 専門能力の成長記録
          </p>
        </div>

        <!-- Progress overview -->
        <div class="st-progress-row" id="stProgressRow"></div>

        <!-- Track selector -->
        <div class="track-selector" id="trackSelector"></div>

        <!-- Tree display -->
        <div class="st-tree-wrap">
          <div class="st-tree" id="skillTree"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Detail popup -->
  <div class="sk-overlay" id="skOverlay" onclick="closeDetail()"></div>
  <div class="sk-detail" id="skDetail"></div>

  <script src="./js/core/error-handler.js" defer></script>
  <script src="./js/data/data-bundle.js" defer></script>
  <script src="./js/core/router-fallback.js" defer></script>
  <script src="./js/core/loading.js" defer></script>
  <script src="./js/core/sidebar.js" defer></script>
  <script src="./js/core/bookmark.js" defer></script>
  <script src="./js/core/main.js" defer></script>
  <script src="./js/core/modal.js" defer></script>
  <script src="./js/core/progress.js" defer></script>
  <script src="./js/core/story-engine.js" defer></script>
  <script src="./js/core/notifications.js" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    (function(){
      if (!ProgressSystem.checkPageAccess('skill-tree.html')) {
        ModalSystem.warning('このページにアクセスするには LEVEL 1 が必要です。','ACCESS DENIED')
          .then(function(){ Router.navigate('#/dashboard'); });
        return;
      }

      var SK_KEY = 'kaishoku_skills';
      var user = ProgressSystem.getUserData() || { level: 0 };
      var userLevel = user.level || 0;

      // ── Skill data ──────────────────────────────────────────
      var TRACKS = [
        {
          id: 'convergence', label: '収束', icon: '⚡', color: '#ef4444',
          skills: [
            { id:'sk_c1', icon:'🎯', name:'基礎収束術', level:0, req:[], xp:0,
              desc:'海蝕現象への基本的な対処法を習得。',
              effects:['XP獲得量 +10%','インシデント報告の閲覧解放'] },
            { id:'sk_c2', icon:'🛡', name:'防護フォーム', level:1, req:['sk_c1'], xp:50,
              desc:'実体との接触時に自己防衛を行う姿勢と判断力。',
              effects:['チャットでの情報共有 XP +15','収束作戦関連コンテンツの解放'] },
            { id:'sk_c3', icon:'⚔️', name:'近接収束', level:2, req:['sk_c2'], xp:150,
              desc:'モジュールを使った近距離での収束技術。',
              effects:['ミッション詳細 XP +20%','限定ミッションへのアクセス'] },
            { id:'sk_c4', icon:'💥', name:'収束マスタリー', level:3, req:['sk_c3'], xp:350,
              desc:'複数の実体を同時に収束させる高度な技術。',
              effects:['全ミッション XP +25%','上級ミッションのアンロック'] },
            { id:'sk_c5', icon:'🌀', name:'次元固定', level:4, req:['sk_c4'], xp:700,
              desc:'次元境界そのものを一時的に固定する最高技術。',
              effects:['M-019使用資格 AAA付与','LEVEL5専用コンテンツ一部解放'] },
          ]
        },
        {
          id: 'analysis', label: '解析', icon: '🔬', color: '#3b82f6',
          skills: [
            { id:'sk_a1', icon:'📡', name:'異常感知', level:0, req:[], xp:0,
              desc:'海蝕現象の初期兆候を感知する訓練。',
              effects:['マップ情報 詳細表示','実体カタログ解放'] },
            { id:'sk_a2', icon:'🧬', name:'実体分類', level:1, req:['sk_a1'], xp:50,
              desc:'実体の種類と危険度を正確に評価する能力。',
              effects:['実体詳細ページ XP +15','分類フィルター機能解放'] },
            { id:'sk_a3', icon:'📊', name:'GSI測定', level:2, req:['sk_a2'], xp:150,
              desc:'GSI値を現場で測定・解釈する技術。',
              effects:['統計ページ解放','高精度インシデント報告が可能に'] },
            { id:'sk_a4', icon:'🔭', name:'次元観測', level:3, req:['sk_a3'], xp:350,
              desc:'次元境界の薄化を事前に予測する高度な分析。',
              effects:['DEAN監視網アクセス','予測警報の閲覧権限'] },
            { id:'sk_a5', icon:'🌐', name:'境界理論', level:4, req:['sk_a4'], xp:700,
              desc:'次元間の境界理論を完全に理解した研究者レベル。',
              effects:['世界設定辞典 全エントリ解放','研究ルート開放'] },
          ]
        },
        {
          id: 'intelligence', label: '情報', icon: '🕵️', color: '#8b5cf6',
          skills: [
            { id:'sk_i1', icon:'👁', name:'観察眼', level:0, req:[], xp:0,
              desc:'現場の状況を正確に観察・記録する基本能力。',
              effects:['閲覧履歴 詳細統計','検索機能解放'] },
            { id:'sk_i2', icon:'🗂', name:'情報整理', level:1, req:['sk_i1'], xp:50,
              desc:'収集した情報を体系的に整理・分析する。',
              effects:['コデックスへのアクセス','ブックマーク機能強化'] },
            { id:'sk_i3', icon:'🔐', name:'機密取扱', level:2, req:['sk_i2'], xp:150,
              desc:'機密情報を適切に取り扱う能力と資格。',
              effects:['機密開示申請が可能に','一部CLASSIFIED情報にアクセス'] },
            { id:'sk_i4', icon:'📜', name:'歴史分析', level:3, req:['sk_i3'], xp:350,
              desc:'機関の歴史的事案を深く理解し、パターンを読む。',
              effects:['機関史 機密エントリ解放','過去事案との照合機能'] },
            { id:'sk_i5', icon:'🔮', name:'真実の目', level:4, req:['sk_i4'], xp:700,
              desc:'全情報を統合し、隠された真実に迫る洞察力。',
              effects:['ARG真エンドルート解放','全機密文書アクセス'] },
          ]
        },
        {
          id: 'field', label: '現場', icon: '🏃', color: '#10b981',
          skills: [
            { id:'sk_f1', icon:'🧭', name:'現場判断', level:0, req:[], xp:0,
              desc:'予期しない状況での迅速な判断力を鍛える。',
              effects:['インシデントレポート解放','現場報告 XP +10%'] },
            { id:'sk_f2', icon:'🤝', name:'連携作戦', level:1, req:['sk_f1'], xp:50,
              desc:'他の機関員とチームで動く際の連携スキル。',
              effects:['チャット機能 XP +20%','グループ作戦ログ閲覧'] },
            { id:'sk_f3', icon:'🚁', name:'緊急対応', level:2, req:['sk_f2'], xp:150,
              desc:'緊急事態における迅速かつ適切な初動対応。',
              effects:['緊急通報システムアクセス','緊急モジュール申請権限'] },
            { id:'sk_f4', icon:'🗺', name:'広域展開', level:3, req:['sk_f3'], xp:350,
              desc:'広いエリアにわたる複数事案の同時対応能力。',
              effects:['全国マップ詳細アクセス','複数インシデント管理'] },
            { id:'sk_f5', icon:'🌟', name:'伝説の機関員', level:4, req:['sk_f4'], xp:700,
              desc:'あらゆる状況を乗り越えた、機関最高峰の現場力。',
              effects:['全部門ページへのアクセス','機関員殿堂入り記録'] },
          ]
        },
      ];

      var selectedTrack = 'convergence';
      var unlockedSkills = JSON.parse(localStorage.getItem(SK_KEY) || '[]');

      function isUnlocked(id) { return unlockedSkills.indexOf(id) >= 0; }
      function canUnlock(skill) {
        if (isUnlocked(skill.id)) return false;
        if (userLevel < skill.level) return false;
        return skill.req.every(isUnlocked);
      }

      // ── Progress Row ─────────────────────────────────────────
      function renderProgress() {
        var el = document.getElementById('stProgressRow');
        el.innerHTML = TRACKS.map(function(t) {
          var total = t.skills.length;
          var done = t.skills.filter(function(s){ return isUnlocked(s.id); }).length;
          var pct = Math.round((done/total)*100);
          return '<div class="st-progress-card">' +
            '<div class="stp-track" style="color:' + t.color + '">' + t.icon + ' ' + t.label + '系</div>' +
            '<div class="stp-bar"><div class="stp-fill" style="width:' + pct + '%;background:' + t.color + '"></div></div>' +
            '<div class="stp-count">' + done + '/' + total + ' (' + pct + '%)</div>' +
            '</div>';
        }).join('');
      }

      // ── Track Selector ───────────────────────────────────────
      function renderTracks() {
        var el = document.getElementById('trackSelector');
        el.innerHTML = TRACKS.map(function(t) {
          return '<button class="track-btn ' + (t.id === selectedTrack ? 'active' : '') + '" ' +
            'style="--tc:' + t.color + '" onclick="selectTrack(\'' + t.id + '\')">' +
            t.icon + ' ' + t.label + '系スキル</button>';
        }).join('');
      }

      window.selectTrack = function(id) {
        selectedTrack = id;
        renderTracks();
        renderTree();
      };

      // ── Tree ────────────────────────────────────────────────
      function renderTree() {
        var track = TRACKS.find(function(t){ return t.id === selectedTrack; });
        if (!track) return;
        var el = document.getElementById('skillTree');
        el.innerHTML = track.skills.map(function(skill, idx) {
          var unlocked = isUnlocked(skill.id);
          var available = canUnlock(skill);
          var stateClass = unlocked ? 'unlocked' : 'locked';
          var glowStyle = unlocked ? '--sk-color:' + track.color : '--sk-color:rgba(255,255,255,.2)';
          var connStyle = (idx < track.skills.length - 1)
            ? '<div class="sk-connector-down ' + (unlocked ? '' : 'locked') + '" style="--sk-color:' + track.color + '"></div>'
            : '';
          return '<div class="st-row" style="' + (idx === 0 ? 'margin-bottom:0' : 'margin-bottom:0') + '">' +
            '<div class="sk-node ' + stateClass + '" style="' + (idx === 0 ? '' : '') + '">' +
            '<div class="sk-bubble ' + stateClass + '" style="' + glowStyle + '" ' +
            'onclick="showDetail(\'' + skill.id + '\',\'' + selectedTrack + '\')">' +
            skill.icon +
            '<div class="sk-level-badge" style="' + (unlocked ? 'background:' + track.color : 'background:rgba(255,255,255,.15)') + '">L' + skill.level + '</div>' +
            '</div>' +
            connStyle +
            '<div class="sk-name">' + skill.name + '</div>' +
            '</div></div>';
        }).join('');
      }

      // ── Detail Popup ─────────────────────────────────────────
      window.showDetail = function(skillId, trackId) {
        var track = TRACKS.find(function(t){ return t.id === trackId; });
        var skill = track && track.skills.find(function(s){ return s.id === skillId; });
        if (!skill) return;
        var unlocked = isUnlocked(skill.id);
        var available = canUnlock(skill);
        var reqNames = skill.req.map(function(r) {
          for (var i=0;i<TRACKS.length;i++) {
            var found = TRACKS[i].skills.find(function(s){ return s.id === r; });
            if (found) return found.name;
          }
          return r;
        });

        var btnHtml = '';
        if (unlocked) {
          btnHtml = '<button class="sdd-unlock-btn" disabled>✓ 習得済み</button>';
        } else if (available) {
          btnHtml = '<button class="sdd-unlock-btn" onclick="unlockSkill(\'' + skillId + '\')">▶ スキルを習得する</button>';
        } else {
          btnHtml = '<button class="sdd-unlock-btn" disabled>ロック中</button>' +
            '<div class="sdd-locked-notice">' +
            (userLevel < skill.level ? 'LEVEL ' + skill.level + ' が必要です' :
             '前提スキルを先に習得してください') + '</div>';
        }

        var reqHtml = reqNames.length
          ? '<div class="sdd-req">前提: ' + reqNames.join(' / ') + '</div>'
          : '<div class="sdd-req">前提スキルなし</div>';

        document.getElementById('skDetail').innerHTML =
          '<div class="sdd-header">' +
          '<div class="sdd-icon">' + skill.icon + '</div>' +
          '<div>' +
          '<div style="font-family:\'Space Grotesk\',sans-serif;font-size:1.1rem;font-weight:700;color:white;text-transform:uppercase;">' + skill.name + '</div>' +
          '<div style="font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:' + track.color + ';margin-top:.2rem;">LEVEL ' + skill.level + ' | ' + track.label + '系</div>' +
          '</div>' +
          '<button class="sdd-close" onclick="closeDetail()">✕</button>' +
          '</div>' +
          '<p style="font-size:.875rem;color:var(--muted-foreground);line-height:1.6;">' + skill.desc + '</p>' +
          '<div class="sdd-effects">' +
          '<div style="font-family:\'JetBrains Mono\',monospace;font-size:.65rem;color:' + track.color + ';text-transform:uppercase;margin-bottom:.5rem;">習得効果</div>' +
          skill.effects.map(function(e){ return '<div class="sdd-effect"><span class="sdd-bullet">▸</span><span>' + e + '</span></div>'; }).join('') +
          '</div>' +
          reqHtml +
          btnHtml;

        document.getElementById('skDetail').classList.add('open');
        document.getElementById('skOverlay').classList.add('open');
      };

      window.closeDetail = function() {
        document.getElementById('skDetail').classList.remove('open');
        document.getElementById('skOverlay').classList.remove('open');
      };

      window.unlockSkill = function(skillId) {
        if (isUnlocked(skillId)) return;
        unlockedSkills.push(skillId);
        localStorage.setItem(SK_KEY, JSON.stringify(unlockedSkills));
        ProgressSystem.trackActivity('mission_complete');
        closeDetail();
        renderProgress();
        renderTree();
        ModalSystem.success('スキル習得完了', 'スキルを習得しました');
      };

      document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDetail(); });

      // ── Init ─────────────────────────────────────────────────
      renderProgress();
      renderTracks();
      renderTree();
    })();
    }); // end DOMContentLoaded
</script>
</body>
</html>
